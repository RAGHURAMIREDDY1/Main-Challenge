# Cloud Build configuration for multi-service deployment
steps:
  # 1. Build & Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/promptwars-repo/voyage-backend', '-f', 'backend/Dockerfile', 'backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/promptwars-repo/voyage-backend']

  # 2. Build & Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/promptwars-repo/voyage-frontend', '-f', 'frontend/Dockerfile', 'frontend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/promptwars-repo/voyage-frontend']

  # 3. Deploy Backend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'voyage-backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/promptwars-repo/voyage-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # 4. Deploy Frontend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'voyage-frontend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/promptwars-repo/voyage-frontend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/promptwars-repo/voyage-backend'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/promptwars-repo/voyage-frontend'
