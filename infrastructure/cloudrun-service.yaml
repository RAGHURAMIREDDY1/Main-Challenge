# Knative Service specification for deploying to Cloud Run
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-travel-backend
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        # Scale to zero to save costs
        autoscaling.knative.dev/minScale: "0"
        # Set max instances to prevent runaway costs
        autoscaling.knative.dev/maxScale: "10"
        # Optimize CPU allocation (only allocate CPU during request processing)
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      containers:
      - image: gcr.io/YOUR_PROJECT_ID/ai-travel-backend:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1000m"
            memory: "512Mi"
        env:
        - name: ENVIRONMENT
          value: "production"
        # Referencing secrets securely from Google Secret Manager
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-api-key
              key: latest
